<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Rain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  #toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #1a1a2e;
    width: 100%;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #toolbar label { color: #ccc; font-size: 14px; }
  .color-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid #333;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: #fff; transform: scale(1.2); }
  #clearBtn {
    background: #c0392b; color: #fff; border: none;
    padding: 6px 16px; border-radius: 4px; cursor: pointer;
    font-size: 14px; margin-left: 16px;
  }
  #clearBtn:hover { background: #e74c3c; }
  canvas {
    display: block;
    cursor: crosshair;
    background: #0d0d1a;
  }
  #info {
    position: fixed; bottom: 8px; right: 12px;
    color: #555; font-size: 12px;
    text-align: right; line-height: 1.5;
  }
  #score {
    position: fixed; top: 70px; left: 16px;
    color: #ffe066; font-size: 18px; font-weight: bold;
    text-shadow: 0 0 8px rgba(255,224,102,0.6);
    pointer-events: none;
  }
  #combo {
    position: fixed; top: 100px; left: 16px;
    color: #ff85c8; font-size: 14px;
    text-shadow: 0 0 6px rgba(255,133,200,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tool-btn {
    background: #2a2a4e; color: #ddd; border: 1px solid #444;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    font-size: 12px;
  }
  .tool-btn.active { background: #4a4a8e; border-color: #88f; color: #fff; }
  .tool-btn:hover { background: #3a3a6e; }
</style>
</head>
<body>

<div id="toolbar">
  <label>Color:</label>
  <div class="color-btn active" data-color="diamond-clear" style="background: linear-gradient(135deg, #e8f4fd, #a8d8ea, #cce5ff)" title="Clear Diamond"></div>
  <div class="color-btn" data-color="diamond-blue" style="background: linear-gradient(135deg, #1e90ff, #00bfff, #87cefa)" title="Blue Diamond"></div>
  <div class="color-btn" data-color="diamond-red" style="background: linear-gradient(135deg, #ff4444, #ff6b6b, #ffaaaa)" title="Ruby"></div>
  <div class="color-btn" data-color="diamond-green" style="background: linear-gradient(135deg, #2ecc71, #55efc4, #a0ffb0)" title="Emerald"></div>
  <div class="color-btn" data-color="diamond-gold" style="background: linear-gradient(135deg, #f1c40f, #f39c12, #ffe066)" title="Gold Diamond"></div>
  <div class="color-btn" data-color="diamond-purple" style="background: linear-gradient(135deg, #9b59b6, #c39bd3, #d7bde2)" title="Amethyst"></div>
  <div class="color-btn" data-color="diamond-pink" style="background: linear-gradient(135deg, #ff69b4, #ff85c8, #ffb6d9)" title="Pink Diamond"></div>
  <div class="color-btn" data-color="diamond-rainbow" style="background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red)" title="Rainbow (rare!)"></div>
  <button class="tool-btn" id="toolPour" title="Left-click to pour">💎 Pour</button>
  <button class="tool-btn" id="toolBlackhole" title="Left-click to suck">🌀 Black Hole</button>
  <button class="tool-btn" id="toolBomb" title="Left-click to detonate">💥 Bomb</button>
  <button class="tool-btn" id="toolMidas" title="Touch to turn gold">✨ Midas</button>
  <button id="clearBtn">Clear</button>
</div>

<canvas id="canvas"></canvas>
<div id="score">💎 Score: 0</div>
<div id="combo"></div>
<div id="info">
  Click & drag to pour · <b>Space</b> = explode · <b>G</b> = flip gravity<br>
  <b>←/→</b> = wind · <b>E</b> = earthquake · Match 12+ same color = fireworks!
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight;
}
resize();
window.addEventListener('resize', () => { resize(); grid = createGrid(); diamonds = []; particles = []; });

// Grid-based simulation (like sand games)
const CELL = 10; // each cell is 10x10 pixels
let cols, rows, grid;

function createGrid() {
  cols = Math.ceil(canvas.width / CELL);
  rows = Math.ceil(canvas.height / CELL);
  const g = new Array(cols * rows);
  g.fill(null);
  return g;
}
grid = createGrid();

function idx(x, y) { return y * cols + x; }
function inBounds(x, y) { return x >= 0 && x < cols && y >= 0 && y < rows; }
function isEmpty(x, y) { return inBounds(x, y) && grid[idx(x, y)] === null; }

// Diamond color palettes
const PALETTES = {
  'diamond-clear': { base: [200, 225, 245], highlight: [255, 255, 255], shadow: [160, 200, 230], sparkle: [255, 255, 255] },
  'diamond-blue':  { base: [30, 144, 255],  highlight: [135, 206, 250], shadow: [0, 80, 180],    sparkle: [200, 235, 255] },
  'diamond-red':   { base: [220, 50, 50],   highlight: [255, 150, 150], shadow: [160, 20, 20],   sparkle: [255, 200, 200] },
  'diamond-green': { base: [46, 204, 113],  highlight: [160, 255, 180], shadow: [20, 140, 60],   sparkle: [200, 255, 220] },
  'diamond-gold':  { base: [241, 196, 15],  highlight: [255, 240, 120], shadow: [180, 140, 0],   sparkle: [255, 255, 200] },
  'diamond-purple':{ base: [155, 89, 182],  highlight: [215, 180, 230], shadow: [100, 50, 130],  sparkle: [230, 210, 245] },
  'diamond-pink':  { base: [255, 105, 180], highlight: [255, 185, 220], shadow: [200, 60, 130],  sparkle: [255, 220, 240] },
  'diamond-rainbow':{ base: [255, 255, 255], highlight: [255, 255, 255], shadow: [180, 180, 180], sparkle: [255, 255, 255], rainbow: true },
};

// Score & combo
let score = 0;
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
function addScore(n, msg) {
  score += n;
  scoreEl.textContent = `💎 Score: ${score}`;
  if (msg) {
    comboEl.textContent = msg;
    comboEl.style.opacity = 1;
    clearTimeout(comboEl._t);
    comboEl._t = setTimeout(() => comboEl.style.opacity = 0, 1500);
  }
}

// Tool modes
let tool = 'pour'; // pour | blackhole | bomb | midas
const toolButtons = {
  pour: document.getElementById('toolPour'),
  blackhole: document.getElementById('toolBlackhole'),
  bomb: document.getElementById('toolBomb'),
  midas: document.getElementById('toolMidas'),
};
toolButtons.pour.classList.add('active');
Object.entries(toolButtons).forEach(([name, btn]) => {
  btn.addEventListener('click', () => {
    tool = name;
    Object.values(toolButtons).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// World state
let gravityDir = 1;       // 1 = down, -1 = up
let windForce = 0;        // -1, 0, 1
let shakeFrames = 0;
let particles = [];       // free physics particles (from explosions, fireworks)

let currentColor = 'diamond-clear';

// Color button selection
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  grid.fill(null);
  diamonds = [];
  particles = [];
  score = 0;
  scoreEl.textContent = '💎 Score: 0';
});

// Keyboard
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === ' ') { explodeAt(mouseX, mouseY, 60); e.preventDefault(); }
  if (e.key === 'g' || e.key === 'G') { gravityDir *= -1; addScore(0, gravityDir === 1 ? '⬇ Gravity restored' : '⬆ Gravity flipped!'); }
  if (e.key === 'e' || e.key === 'E') { shakeFrames = 30; addScore(0, '🌋 Earthquake!'); }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

function getWind() {
  let w = 0;
  if (keys['ArrowLeft']) w -= 1;
  if (keys['ArrowRight']) w += 1;
  return w;
}

// Each placed cell stores its diamond appearance
let diamonds = []; // for rendering

function makeDiamondCell(colorName) {
  // 1% chance any spawn becomes a rare rainbow diamond
  if (colorName !== 'diamond-rainbow' && Math.random() < 0.01) colorName = 'diamond-rainbow';
  const p = PALETTES[colorName];
  const vary = () => Math.floor(Math.random() * 30 - 15);
  const clamp = v => Math.max(0, Math.min(255, v));
  return {
    color: colorName,
    r: clamp(p.base[0] + vary()),
    g: clamp(p.base[1] + vary()),
    b: clamp(p.base[2] + vary()),
    hr: p.highlight[0], hg: p.highlight[1], hb: p.highlight[2],
    sr: p.shadow[0], sg: p.shadow[1], sb: p.shadow[2],
    rainbow: !!p.rainbow,
    sparkle: !!p.rainbow || Math.random() < 0.15,
    facetAngle: Math.random() * Math.PI * 2,
    alpha: 0.75 + Math.random() * 0.25,
  };
}

// ─── EXPLOSION ─────────────────────────────────────────────
function explodeAt(px, py, radiusPx) {
  const cx = px / CELL, cy = py / CELL;
  const r = radiusPx / CELL;
  let count = 0;
  for (let y = Math.max(0, Math.floor(cy - r)); y < Math.min(rows, Math.ceil(cy + r)); y++) {
    for (let x = Math.max(0, Math.floor(cx - r)); x < Math.min(cols, Math.ceil(cx + r)); x++) {
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > r) continue;
      const cell = grid[idx(x, y)];
      if (!cell) continue;
      grid[idx(x, y)] = null;
      const ang = Math.atan2(dy, dx) || (Math.random() * Math.PI * 2);
      const speed = (1 - dist / r) * 8 + 2;
      particles.push({
        x: x * CELL + CELL/2,
        y: y * CELL + CELL/2,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed - 2,
        cell,
        life: 60 + Math.random() * 30,
      });
      count++;
    }
  }
  if (count > 0) addScore(count, `💥 Boom! +${count}`);
  // shockwave ring
  particles.push({ ring: true, x: px, y: py, r: 0, maxR: radiusPx * 2.5, life: 30 });
}

// ─── BLACK HOLE ────────────────────────────────────────────
function blackHolePull(px, py) {
  const cx = px / CELL, cy = py / CELL;
  const r = 12;
  // collect movable cells in radius
  const moves = [];
  for (let y = Math.max(0, Math.floor(cy - r)); y < Math.min(rows, Math.ceil(cy + r)); y++) {
    for (let x = Math.max(0, Math.floor(cx - r)); x < Math.min(cols, Math.ceil(cx + r)); x++) {
      const dx = cx - x, dy = cy - y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 1 || dist > r) continue;
      const cell = grid[idx(x, y)];
      if (!cell) continue;
      // step toward center
      const sx = Math.sign(dx), sy = Math.sign(dy);
      // 50/50 prefer x or y depending on magnitude
      let nx = x, ny = y;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (sx !== 0 && isEmpty(x + sx, y)) nx = x + sx;
        else if (sy !== 0 && isEmpty(x, y + sy)) ny = y + sy;
      } else {
        if (sy !== 0 && isEmpty(x, y + sy)) ny = y + sy;
        else if (sx !== 0 && isEmpty(x + sx, y)) nx = x + sx;
      }
      if (nx !== x || ny !== y) moves.push([x, y, nx, ny, cell]);
    }
  }
  for (const [x, y, nx, ny, cell] of moves) {
    if (grid[idx(x, y)] === cell && isEmpty(nx, ny)) {
      grid[idx(nx, ny)] = cell;
      grid[idx(x, y)] = null;
    }
  }
}

// ─── MIDAS TOUCH ───────────────────────────────────────────
function midasTouch(px, py) {
  const cx = px / CELL, cy = py / CELL;
  const r = 4;
  for (let y = Math.max(0, Math.floor(cy - r)); y < Math.min(rows, Math.ceil(cy + r)); y++) {
    for (let x = Math.max(0, Math.floor(cx - r)); x < Math.min(cols, Math.ceil(cx + r)); x++) {
      const dx = x - cx, dy = y - cy;
      if (dx*dx + dy*dy > r*r) continue;
      const cell = grid[idx(x, y)];
      if (!cell || cell.color === 'diamond-gold') continue;
      grid[idx(x, y)] = makeDiamondCell('diamond-gold');
    }
  }
}

// ─── MATCH DETECTION (flood-fill connected groups) ─────────
let matchTimer = 0;
function findMatches() {
  const visited = new Uint8Array(cols * rows);
  const THRESHOLD = 12;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const i = idx(x, y);
      if (visited[i]) continue;
      const cell = grid[i];
      if (!cell || cell.rainbow) continue;
      // BFS for same color
      const color = cell.color;
      const stack = [i];
      const group = [];
      visited[i] = 1;
      while (stack.length) {
        const k = stack.pop();
        group.push(k);
        const kx = k % cols, ky = (k - kx) / cols;
        const neigh = [[kx+1,ky],[kx-1,ky],[kx,ky+1],[kx,ky-1]];
        for (const [nx, ny] of neigh) {
          if (!inBounds(nx, ny)) continue;
          const ni = idx(nx, ny);
          if (visited[ni]) continue;
          const nc = grid[ni];
          if (nc && nc.color === color) {
            visited[ni] = 1;
            stack.push(ni);
          }
        }
      }
      if (group.length >= THRESHOLD) {
        // Vaporize into firework!
        for (const k of group) {
          const kx = k % cols, ky = (k - kx) / cols;
          const c = grid[k];
          grid[k] = null;
          if (Math.random() < 0.6) {
            particles.push({
              x: kx * CELL + CELL/2,
              y: ky * CELL + CELL/2,
              vx: (Math.random() - 0.5) * 6,
              vy: (Math.random() - 0.5) * 6 - 3,
              cell: c,
              life: 40 + Math.random() * 30,
              firework: true,
            });
          }
        }
        const bonus = group.length * 5;
        addScore(bonus, `🎆 ${group.length}-MATCH! +${bonus}`);
      }
    }
  }
}

// Pouring
let pouring = false;
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', (e) => { pouring = true; updateMouse(e); });
canvas.addEventListener('mousemove', (e) => { updateMouse(e); });
canvas.addEventListener('mouseup', () => { pouring = false; });
canvas.addEventListener('mouseleave', () => { pouring = false; });

canvas.addEventListener('touchstart', (e) => { pouring = true; updateTouch(e); e.preventDefault(); });
canvas.addEventListener('touchmove', (e) => { updateTouch(e); e.preventDefault(); });
canvas.addEventListener('touchend', () => { pouring = false; });

function updateMouse(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
}
function updateTouch(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - rect.left;
  mouseY = e.touches[0].clientY - rect.top;
}

// Spawn diamonds at cursor (or run active tool)
let bombCooldown = 0;
function spawnDiamonds() {
  if (!pouring) return;
  if (tool === 'pour') {
    for (let i = 0; i < 3; i++) {
      const cx = Math.floor((mouseX + (Math.random() - 0.5) * 20) / CELL);
      const cy = Math.floor((mouseY + (Math.random() - 0.5) * 10) / CELL);
      if (inBounds(cx, cy) && isEmpty(cx, cy)) {
        const cell = makeDiamondCell(currentColor);
        grid[idx(cx, cy)] = cell;
        addScore(1);
      }
    }
  } else if (tool === 'blackhole') {
    blackHolePull(mouseX, mouseY);
  } else if (tool === 'bomb') {
    if (bombCooldown <= 0) {
      explodeAt(mouseX, mouseY, 50);
      bombCooldown = 25;
    }
  } else if (tool === 'midas') {
    midasTouch(mouseX, mouseY);
  }
}

// Physics: sand-like falling with diamond behavior
function simulate() {
  if (bombCooldown > 0) bombCooldown--;
  if (shakeFrames > 0) shakeFrames--;
  const wind = getWind();
  const gd = gravityDir; // +1 down, -1 up
  // Iterate from "downstream" to "upstream"
  const yStart = gd === 1 ? rows - 2 : 1;
  const yEnd = gd === 1 ? -1 : rows;
  const yStep = gd === 1 ? -1 : 1;

  for (let y = yStart; y !== yEnd; y += yStep) {
    const dir = Math.random() < 0.5 ? 1 : -1;
    const startX = dir === 1 ? 0 : cols - 1;
    for (let i = 0; i < cols; i++) {
      const x = startX + i * dir;
      const cell = grid[idx(x, y)];
      if (cell === null) continue;

      const ny = y + gd;
      // Earthquake: random horizontal jitter chance
      if (shakeFrames > 0 && Math.random() < 0.3) {
        const jx = x + (Math.random() < 0.5 ? -1 : 1);
        if (isEmpty(jx, y)) {
          grid[idx(jx, y)] = cell;
          grid[idx(x, y)] = null;
          continue;
        }
      }
      // Wind: try to push horizontally before falling
      if (wind !== 0 && Math.random() < 0.5 && isEmpty(x + wind, y)) {
        grid[idx(x + wind, y)] = cell;
        grid[idx(x, y)] = null;
        continue;
      }
      // Fall straight in gravity direction
      if (isEmpty(x, ny)) {
        grid[idx(x, ny)] = cell;
        grid[idx(x, y)] = null;
      } else {
        const lr = Math.random() < 0.5 ? -1 : 1;
        if (isEmpty(x + lr, ny)) {
          grid[idx(x + lr, ny)] = cell;
          grid[idx(x, y)] = null;
        } else if (isEmpty(x - lr, ny)) {
          grid[idx(x - lr, ny)] = cell;
          grid[idx(x, y)] = null;
        }
      }
    }
  }

  // Update free particles
  const wf = getWind() * 0.15;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.ring) {
      p.r += (p.maxR - p.r) * 0.15;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
      continue;
    }
    p.vx += wf;
    p.vy += 0.25 * gravityDir;
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    // Settle particles back into the grid when slow + on the ground
    if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
      particles.splice(i, 1);
      continue;
    }
    if (!p.firework && Math.abs(p.vx) < 1.2 && Math.abs(p.vy) < 1.5) {
      const gx = Math.floor(p.x / CELL);
      const gy = Math.floor(p.y / CELL);
      if (inBounds(gx, gy) && isEmpty(gx, gy)) {
        grid[idx(gx, gy)] = p.cell;
        particles.splice(i, 1);
      }
    }
  }

  // Periodic match scan
  matchTimer++;
  if (matchTimer >= 30) { matchTimer = 0; findMatches(); }
}

function rainbowColor(t, offset) {
  const h = (t * 60 + offset) % 360;
  // simple HSL→RGB
  const c = 1, x = 1 - Math.abs(((h / 60) % 2) - 1);
  let r=0,g=0,b=0;
  if (h < 60)      { r=c; g=x; }
  else if (h<120)  { r=x; g=c; }
  else if (h<180)  { g=c; b=x; }
  else if (h<240)  { g=x; b=c; }
  else if (h<300)  { r=x; b=c; }
  else             { r=c; b=x; }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

// Render diamonds as faceted gem shapes
function render() {
  ctx.save();
  // Screen shake
  if (shakeFrames > 0) {
    const s = shakeFrames * 0.5;
    ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
  }

  ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);

  // Draw a subtle gradient background — flips with gravity
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (gravityDir === 1) {
    bgGrad.addColorStop(0, '#0d0d1a');
    bgGrad.addColorStop(1, '#1a1a2e');
  } else {
    bgGrad.addColorStop(0, '#1a1a2e');
    bgGrad.addColorStop(1, '#0d0d1a');
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

  const time = performance.now() * 0.001;

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const cell = grid[idx(x, y)];
      if (cell === null) continue;

      const px = x * CELL;
      const py = y * CELL;
      const half = CELL / 2;
      const cx = px + half;
      const cy = py + half;

      // Draw diamond shape (rotated square / gem facets)
      ctx.save();
      ctx.translate(cx, cy);

      // Main diamond body
      ctx.beginPath();
      ctx.moveTo(0, -half);       // top
      ctx.lineTo(half, 0);        // right
      ctx.lineTo(0, half);        // bottom
      ctx.lineTo(-half, 0);       // left
      ctx.closePath();

      // Fill with gradient for gem look
      let r = cell.r, g = cell.g, b = cell.b;
      if (cell.rainbow) {
        const rc = rainbowColor(time, (x + y) * 20);
        r = rc[0]; g = rc[1]; b = rc[2];
      }
      const grad = ctx.createLinearGradient(-half, -half, half, half);
      grad.addColorStop(0, `rgba(${cell.hr}, ${cell.hg}, ${cell.hb}, ${cell.alpha})`);
      grad.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${cell.alpha})`);
      grad.addColorStop(1, `rgba(${cell.sr}, ${cell.sg}, ${cell.sb}, ${cell.alpha})`);
      ctx.fillStyle = grad;
      ctx.fill();

      // Facet lines for gem look
      ctx.strokeStyle = `rgba(${cell.hr}, ${cell.hg}, ${cell.hb}, 0.3)`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -half);
      ctx.lineTo(0, half);
      ctx.moveTo(-half, 0);
      ctx.lineTo(half, 0);
      ctx.stroke();

      // Outline
      ctx.beginPath();
      ctx.moveTo(0, -half);
      ctx.lineTo(half, 0);
      ctx.lineTo(0, half);
      ctx.lineTo(-half, 0);
      ctx.closePath();
      ctx.strokeStyle = `rgba(${cell.hr}, ${cell.hg}, ${cell.hb}, 0.5)`;
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Sparkle effect on some diamonds
      if (cell.sparkle) {
        const sparkleAlpha = 0.4 + 0.4 * Math.sin(time * 3 + cell.facetAngle * 10);
        ctx.beginPath();
        ctx.arc(-half * 0.3, -half * 0.3, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${sparkleAlpha})`;
        ctx.fill();
      }

      ctx.restore();
    }
  }

  // Render free particles
  for (const p of particles) {
    if (p.ring) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255, 220, 120, ${p.life / 30})`;
      ctx.lineWidth = 3;
      ctx.stroke();
      continue;
    }
    const a = Math.max(0, Math.min(1, p.life / 60));
    let r = p.cell.r, g = p.cell.g, b = p.cell.b;
    if (p.cell.rainbow) {
      const rc = rainbowColor(time, p.x + p.y);
      r = rc[0]; g = rc[1]; b = rc[2];
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, CELL * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a})`;
    ctx.fill();
    if (p.firework) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, CELL * 1.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${a * 0.2})`;
      ctx.fill();
    }
  }

  // Tool cursor preview
  if (tool === 'blackhole') {
    const r = 12 * CELL;
    const g = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, r);
    g.addColorStop(0, 'rgba(120, 80, 200, 0.5)');
    g.addColorStop(0.5, 'rgba(60, 30, 120, 0.2)');
    g.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
    ctx.fill();
    // swirl
    ctx.strokeStyle = 'rgba(200, 180, 255, 0.5)';
    ctx.lineWidth = 1;
    for (let k = 0; k < 3; k++) {
      ctx.beginPath();
      const rot = time * 2 + k * 2.094;
      for (let t = 0; t < 1; t += 0.05) {
        const ang = t * Math.PI * 4 + rot;
        const rr = t * r;
        const px = mouseX + Math.cos(ang) * rr;
        const py = mouseY + Math.sin(ang) * rr;
        if (t === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
  } else if (tool === 'bomb') {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 50, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 100, 100, ${0.4 + 0.3 * Math.sin(time * 8)})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  } else if (tool === 'midas') {
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 4 * CELL, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 215, 0, ${0.5 + 0.3 * Math.sin(time * 6)})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Wind indicator
  const wind = getWind();
  if (wind !== 0) {
    ctx.fillStyle = 'rgba(180, 220, 255, 0.4)';
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(wind > 0 ? '➡' : '⬅', canvas.width / 2, 60);
  }

  ctx.restore();
}

// Game loop
function loop() {
  spawnDiamonds();
  simulate();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
